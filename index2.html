<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Ti ❤️</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background">
        <div class="gradient"></div>
        <div id="petals"></div>
        <div id="hearts"></div>
        <div id="stars"></div>
    </div>

    <button id="musicBtn">🎵</button>
    <audio id="music" loop>
        <source src="">
    </audio>

    <section id="intro" class="screen active">
        <div class="glass">
            <div class="sanrio-container">
                <img src="cinnamoroll-cute.gif" alt="Cinna">
            </div>
            
            <h1>Hola niña hermosa</h1>
            <p>Hoy quería regalarte algo pequeñito...</p>
            <p>Porque estoy muy orgulloso de ti</p>
            <button id="startBtn">Ábreme</button>
        </div>
    </section>

    <section id="envelopeScreen" class="screen">
        <div class="container">
            <h2>Toca el sobre</h2>
            <div id="envelope">
                <div class="flap"></div>
                <div class="pocket"></div>
                <div class="letter-inside"></div>
            </div>
        </div>
    </section>


    <section id="letterScreen" class="screen">
        <div class="paper">

            <div class="sanrio-container">
                <img src="hello-kitty-thumbs-up.gif" alt="Cinna">
            </div>

            <h2>Para la mejor maestra...</h2>
            <div class="scrollable-text">
                <p id="typed"></p>
            </div>
            <button id="finishBtn">🌹</button>
        </div>
    </section>

    <section id="finalScreen" class="screen">
        <div class="glass">
            <h1>¡Felicidades!</h1>

            <p>Gracias por ser una persona tan hermosa.</p>            
            <p>Estoy muy orgulloso de ti.</p>

            <div class="sanrio-container">
                <img src="pom.gif" alt="Cinna">
            </div>

            <button onclick="location.reload()">Volver a verlo</button>
        </div>
    </section>

    <canvas id="confetti"></canvas>
    <script src="script.js"></script>

</body>
</html>
